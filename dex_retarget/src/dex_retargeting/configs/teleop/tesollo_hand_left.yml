retargeting:
  type: vector
  urdf_path: tesollo_hand/tesollo_hand_left.urdf

  # F1=thumb-equivalent, F2=index-equivalent, F3=middle-equivalent
  # Using wrist as origin gives more stable tracking than tip-to-tip vectors
  target_origin_link_names: [ "delto_base_link", "delto_base_link", "delto_base_link" ]
  target_task_link_names: [ "F1_TIP", "F2_TIP", "F3_TIP" ]

  # Human hand keypoint indices: row0=origin(wrist=0), row1=task(fingertips)
  target_link_human_indices: [ [ 0, 0, 0 ], [ 4, 8, 12 ] ]

  # Tesollo DG3F hand is slightly smaller than a human hand; 1.0~1.2 is usually a good fit.
  # 1.5 (original) was too large and pushed fingers to unreachable targets.
  scaling_factor: 1.2

  # Smoothing filter: 0.2 is a good balance of responsiveness vs stability
  low_pass_alpha: 0.2
